<div id="modalDelete" class="modal">
    <div class="modal-content modal-confirm" style="width: 450px; text-align: center;">
        <form method="POST" action="" id="deleteKhuyenMaiForm">
            {% csrf_token %}
            <div class="icon-trash-circle" style="background: #ff4d4d; color: white; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 35px;">
                <i class="fa fa-trash-alt"></i>
            </div>
            <h3 style="color: #555; margin-bottom: 30px;">Bạn có chắc chắn muốn xóa khuyến mãi?</h3>
            <div style="display: flex; justify-content: center; gap: 20px;">
                <button type="button" class="btn-no" style="width: 120px; border: 1px solid #003366; color: #003366;" onclick="closeModal('modalDelete')">Hủy</button>
                <button type="submit" class="btn-yes" style="width: 120px; background-color: #1a5c8b;">Đồng ý</button>
            </div>
        </form>
    </div>
</div>
