<div id="modalAdd" class="modal">
    <div class="modal-content" style="width: 650px;">
        <form method="POST" action="{% url 'them_khuyen_mai' %}">
            {% csrf_token %}
            <div class="modal-header">
                <h3>Thêm khuyến mãi mới</h3>
                <span class="close" onclick="closeModal('modalAdd')">&times;</span>
            </div>
            <div class="form-body">
                <div class="input-group">
                    <label>Tên khuyến mãi <span style="color:red">*</span></label>
                    <input type="text" name="ten" placeholder="Nhập tên coupon" required>
                </div>
                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                    <div class="input-group">
                        <label>Loại giảm giá <span style="color:red">*</span></label>
                        <select name="loai_giam" required>
                            <option value="Phần trăm (%)">Phần trăm (%)</option>
                            <option value="Số tiền cố định">Số tiền cố định</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Giá trị giảm <span style="color:red">*</span></label>
                        <input type="number" name="gia_tri" value="0" required>
                    </div>
                </div>
                <div class="input-group" style="margin-top: 15px;">
                    <label>Sản phẩm áp dụng <span style="color:red">*</span></label>
                    <select name="sp_ma" required>
                        <option value="">-- Chọn sản phẩm --</option>
                        {% for sp in san_phams %}
                        <option value="{{ sp.SP_Ma }}">{{ sp.SP_Ten }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                    <div class="input-group">
                        <label>Ngày bắt đầu <span style="color:red">*</span></label>
                        <input type="date" name="ngay_bd" required>
                    </div>
                    <div class="input-group">
                        <label>Ngày kết thúc <span style="color:red">*</span></label>
                        <input type="date" name="ngay_kt" required>
                    </div>
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 30px;">
                <button type="button" class="btn-no" onclick="closeModal('modalAdd')">Hủy</button>
                <button type="submit" class="btn-yes" style="background-color: #003366;">Lưu</button>
            </div>
        </form>
    </div>
</div>
