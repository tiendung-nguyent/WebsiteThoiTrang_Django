<div id="modalDelete" class="modal">
    <div class="modal-content" style="padding: 40px; text-align: center; max-width: 450px;">
        <div style="width: 100px; height: 100px; background: #ff4d4d; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;">
            <i class="fa fa-trash" style="color: white; font-size: 50px;"></i>
        </div>

        <h2 style="font-size: 22px; color: #475569; margin-bottom: 35px; font-weight: 600;">
            Bạn có chắc chắn muốn xóa khách hàng?
        </h2>

        <div style="display: flex; gap: 15px;">
            <button type="button" onclick="closeModal('modalDelete')"
                    style="flex: 1; padding: 14px; border-radius: 12px; border: 1.5px solid #003366; background: white; color: #003366; font-size: 17px; font-weight: 700; cursor: pointer;">
                Hủy
            </button>

            <form method="POST" style="flex: 1;">
                {% csrf_token %}
                <input type="hidden" name="action" value="delete">
                <input type="hidden" name="KH_Ma" id="deleteTargetId">

                <button type="submit"
                        style="width: 100%; padding: 14px; border-radius: 12px; border: none; background: #003366; color: white; font-size: 17px; font-weight: 700; cursor: pointer;">
                    Đồng ý
                </button>
            </form>
        </div>
    </div>
</div>
