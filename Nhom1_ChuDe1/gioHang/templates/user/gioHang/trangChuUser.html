{% extends 'user/base_user.html' %}
{% load static %}

{% block content %}
<style>
    .section-title { text-align: center; margin-bottom: 30px; font-size: 24px; text-transform: uppercase; }
    .product-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        padding-bottom: 50px;
    }
    .product-card {
        border: 1px solid #eee;
        border-radius: 8px;
        overflow: hidden;
        transition: 0.3s;
        text-decoration: none;
        color: inherit;
        display: block;
    }
    .product-card:hover { shadow: 0 5px 15px rgba(0,0,0,0.1); transform: translateY(-5px); }
    .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    .product-info { padding: 15px; }
    .product-category { font-size: 10px; color: #888; text-transform: uppercase; }
    .product-name { font-size: 14px; font-weight: 600; margin: 5px 0; height: 40px; overflow: hidden; }
    .product-price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .price { color: #004a99; font-weight: bold; }
    .add-btn { background: #004a99; color: white; border: none; padding: 5px 10px; border-radius: 4px; }
</style>

<h2 class="section-title">Sản phẩm nổi bật</h2>

<div class="product-grid">
    {% for i in "12345678" %}
    <a href="{% url 'chiTietSanPham' %}" class="product-card">
        <img src="{% static 'gioHangUser/aothun.jpg' %}" class="product-img" alt="Sản phẩm">
        <div class="product-info">
            <p class="product-category">NAM / GYM</p>
            <p class="product-name">Áo Thun Tập Gym Nam Premium Vải Co Giãn</p>
            <div class="product-price-row">
                <span class="price">299.000 đ</span>
                <button class="add-btn"><i class="fa fa-cart-plus"></i></button>
            </div>
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
