<div class="modal-overlay" id="editModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Chỉnh sửa sản phẩm</h2>
            <button class="btn-close" onclick="closeModal()">×</button>
        </div>

        <div class="modal-body">
            <p>Áo Thể Thao Nam Vải Thun Lạnh Sport Thoáng Khí Vận Động Thoải Mái Dành Cho Gym</p>

            <span class="option-label">Màu sắc</span>
            <div class="btn-group">
                <button class="btn-opt active">Đen</button>
                <button class="btn-opt">Trắng</button>
                <button class="btn-opt">Xám</button>
            </div>

            <span class="option-label">Kích cỡ</span>
            <div class="btn-group">
                <button class="btn-opt">S</button>
                <button class="btn-opt">M</button>
                <button class="btn-opt active">L</button>
                <button class="btn-opt">XL</button>
                <button class="btn-opt">2XL</button>
            </div>

            <span class="option-label">Số lượng</span>
            <div class="qty-group">
                <button>-</button>
                <input type="text" value="1">
                <button>+</button>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">Hủy</button>
            <button class="btn-confirm" onclick="closeModal()">Xác nhận</button>
        </div>
    </div>
</div>
