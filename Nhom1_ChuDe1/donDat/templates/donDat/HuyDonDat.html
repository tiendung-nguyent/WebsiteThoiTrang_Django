<div class="popup-overlay" id="cancel-popup-{{ don.TT_Ma }}" onclick="overlayClose(event, 'cancel-popup-{{ don.TT_Ma }}')">
    <div class="popup-box small" style="text-align:center; padding:58px 50px 48px;">
        <button class="popup-close" type="button" onclick="closePopup('cancel-popup-{{ don.TT_Ma }}')">×</button>

        <style>
            .cancel-icon-wrap {
                width: 120px;
                height: 120px;
                border-radius: 50%;
                background: #ff5c5c;
                color: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 30px;
                font-size: 52px;
            }

            .cancel-title {
                font-size: 28px;
                font-weight: 800;
                color: #555;
                margin-bottom: 18px;
            }

            .cancel-note {
                font-size: 16px;
                color: #8a8a8a;
                margin-bottom: 36px;
            }

            .cancel-actions {
                display: flex;
                justify-content: center;
                gap: 22px;
            }

            .cancel-actions button {
                min-width: 190px;
                height: 62px;
                border-radius: 14px;
                font-size: 18px;
                font-weight: 800;
                cursor: pointer;
            }

            .btn-outline-blue {
                background: white;
                color: #2f67d7;
                border: 1.5px solid #2f67d7;
            }

            .btn-solid-blue {
                background: #2e66ad;
                color: white;
                border: none;
            }
        </style>

        <div class="cancel-icon-wrap">🗑</div>
        <div class="cancel-title">Bạn có chắc chắn muốn hủy đơn?</div>
        <div class="cancel-note">Đơn hàng #{{ don.TT_Ma }}</div>

        <div class="cancel-actions">
            <button type="button" class="btn-outline-blue" onclick="closePopup('cancel-popup-{{ don.TT_Ma }}')">
                Hủy
            </button>

            <form method="POST" action="{% url 'huyDonDat' don.TT_Ma %}" style="margin:0;">
                {% csrf_token %}
                <button type="submit" class="btn-solid-blue">Đồng ý</button>
            </form>
        </div>
    </div>
</div>
