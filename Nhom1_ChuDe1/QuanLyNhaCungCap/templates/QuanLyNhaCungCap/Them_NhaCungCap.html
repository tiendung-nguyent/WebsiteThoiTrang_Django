<div id="modalAdd" class="modal">
    <div class="modal-content" style="width: 600px;">
        <form method="POST" action="{% url 'them_ncc' %}">
            {% csrf_token %}
            <div class="modal-header">
                <h3>Thêm nhà cung cấp mới</h3>
                <span class="close" onclick="closeModal('modalAdd')">&times;</span>
            </div>
            <div class="form-body">
                <div class="input-group">
                    <label>Tên nhà cung cấp <span style="color:red">*</span></label>
                    <input type="text" name="ten" placeholder="Nhập tên nhà cung cấp" required>
                </div>
                <div class="input-group" style="margin-top: 15px;">
                    <label>Số điện thoại <span style="color:red">*</span></label>
                    <input type="text" name="sdt" placeholder="Nhập số điện thoại" required>
                </div>
                <div class="input-group" style="margin-top: 15px;">
                    <label>Địa chỉ <span style="color:red">*</span></label>
                    <input type="text" name="dchi" placeholder="Nhập địa chỉ" required>
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 30px;">
                <button type="button" class="btn-no" onclick="closeModal('modalAdd')">Hủy</button>
                <button type="submit" class="btn-yes" style="background-color: #003366;">Lưu</button>
            </div>
        </form>
    </div>
</div>
