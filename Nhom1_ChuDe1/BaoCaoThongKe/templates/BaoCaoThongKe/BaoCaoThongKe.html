{% extends "staff/base_staff.html" %}

{% block content %}
<style>
    .report-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    .page-title { font-size: 22px; color: #333; font-weight: 700; margin: 0; }

    .current-date {
        background: white;
        padding: 8px 15px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        color: #555;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid #eee;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 30px;
    }

    .stat-card {
        background: white;
        padding: 25px;
        border-radius: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        transition: transform 0.3s;
    }

    .stat-card:hover { transform: translateY(-5px); }

    .stat-info span { color: #888; font-size: 13px; font-weight: 500; }
    .stat-info h2 { font-size: 24px; margin-top: 5px; color: #333; font-weight: 700; }

    .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
    }

    .icon-green { background: #e8f5e9; color: #4caf50; }
    .icon-blue { background: #e3f2fd; color: #2196f3; }
    .icon-purple { background: #f3e5f5; color: #9c27b0; }

    .chart-container {
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }

    .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    .chart-header h3 { font-size: 18px; color: #333; }

    .filter-dropdown {
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        color: #444;
        outline: none;
        cursor: pointer;
        background-color: #fff;
    }
</style>

<div class="report-header">
    <h2 class="page-title">Báo cáo thống kê</h2>
    <div class="current-date">
        <i class="fa fa-calendar-alt" style="color: var(--primary-color);"></i>
        <span id="txtDate">{{ current_date }}</span>
    </div>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-info">
            <span>Doanh thu ngày:</span>
            <h2>{{ daily_revenue }}</h2>
        </div>
        <div class="stat-icon icon-green"><i class="fa fa-dollar-sign"></i></div>
    </div>

    <div class="stat-card">
        <div class="stat-info">
            <span>Đơn hàng mới:</span>
            <h2>{{ new_orders_count }}</h2>
        </div>
        <div class="stat-icon icon-blue"><i class="fa fa-box-open"></i></div>
    </div>

    <div class="stat-card">
        <div class="stat-info">
            <span>Lợi nhuận:</span>
            <h2>{{ daily_profit }}</h2>
        </div>
        <div class="stat-icon icon-purple"><i class="fa fa-chart-line"></i></div>
    </div>
</div>

<div class="chart-container">
    <div class="chart-header">
        <h3>Biểu đồ doanh thu và lợi nhuận</h3>
        <select class="filter-dropdown" id="chartPeriod">
            <option value="week">Tuần này</option>
            <option value="month">Tháng này</option>
            <option value="quarter">Quý này</option>
        </select>
    </div>

    <div style="position: relative; height:45vh; width:100%">
        <canvas id="doanhThuChart"></canvas>
    </div>
</div>

{{ chart_data|json_script:"chart-data" }}

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const chartSource = JSON.parse(document.getElementById("chart-data").textContent);
        const periodSelect = document.getElementById("chartPeriod");
        const ctx = document.getElementById("doanhThuChart").getContext("2d");

        function formatCurrency(value) {
            return value.toLocaleString("vi-VN") + " đ";
        }

        const chart = new Chart(ctx, {
            type: "bar",
            data: {
                labels: chartSource.week.labels,
                datasets: [
                    {
                        label: "Doanh thu",
                        data: chartSource.week.revenue,
                        backgroundColor: "#1a5c8b",
                        borderRadius: 6,
                        barPercentage: 0.6,
                    },
                    {
                        label: "Lợi nhuận",
                        data: chartSource.week.profit,
                        backgroundColor: "#3482b9",
                        borderRadius: 6,
                        barPercentage: 0.6,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: "#f0f0f0" },
                        ticks: {
                            callback: function(value) {
                                return formatCurrency(value);
                            }
                        }
                    },
                    x: {
                        grid: { display: false }
                    }
                },
                plugins: {
                    legend: {
                        position: "bottom",
                        labels: { padding: 20, usePointStyle: true }
                    },
                    tooltip: {
                        padding: 10,
                        backgroundColor: "rgba(0,0,0,0.8)",
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ": " + formatCurrency(context.parsed.y);
                            }
                        }
                    }
                }
            }
        });

        periodSelect.addEventListener("change", function() {
            const selectedPeriod = chartSource[this.value];
            chart.data.labels = selectedPeriod.labels;
            chart.data.datasets[0].data = selectedPeriod.revenue;
            chart.data.datasets[1].data = selectedPeriod.profit;
            chart.update();
        });
    });
</script>

{% endblock %}
