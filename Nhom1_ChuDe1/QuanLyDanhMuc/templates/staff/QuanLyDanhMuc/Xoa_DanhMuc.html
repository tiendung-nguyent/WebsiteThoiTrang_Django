<div id="modalDelete" class="modal">
    <div class="modal-content" style="text-align: center; max-width: 400px;">
        <div style="width: 80px; height: 80px; background: #ff5252; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            <i class="fa fa-trash" style="color: white; font-size: 35px;"></i>
        </div>

        <h2 style="font-size: 22px; color: #475569; margin-bottom: 30px; font-weight: 700;">
            Bạn có chắc chắn muốn xóa danh mục?
        </h2>

        <input type="hidden" id="deleteTargetId">

        <div class="modal-footer" style="gap: 20px;">
            <button class="btn-cancel"
                    style="background: white; color: #1e40af; border: 1px solid #1e40af;"
                    onclick="closeModal('modalDelete')">Hủy</button>
            <button class="btn-save"
                    style="background: #1e40af;"
                    onclick="confirmDelete()">Đồng ý</button>
        </div>
    </div>
</div>
