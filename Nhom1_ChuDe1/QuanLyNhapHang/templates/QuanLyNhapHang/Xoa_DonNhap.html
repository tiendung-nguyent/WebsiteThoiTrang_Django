<div id="modalDelete" class="modal">
    <div class="modal-content modal-confirm">
        <div class="icon-trash-circle">
            <i class="fa fa-trash-alt"></i>
        </div>
        <h3 style="margin-bottom: 10px;">Bạn có chắc chắn muốn xóa đơn nhập?</h3>

        <div class="btn-group-confirm">
            <button class="btn-no" onclick="closeModal('modalDelete')">
                Hủy
            </button>

            <button class="btn-yes" onclick="confirmDelete()" style="background-color: #1a5c8b; color: white; border: none;">
                Đồng ý
            </button>
        </div>
    </div>
</div>
