{% extends "user/base_user.html" %}
{% load static %}

{% block content %}
<style>
    .success-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
        background-color: #f0f4f8;
        padding: 20px;
    }

    .success-card {
        background: #ffffff;
        padding: 50px 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 500px;
        text-align: center;
        position: relative;
    }

    .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 45px;
        height: 45px;
        background-color: #f0f0f0;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #333;
        text-decoration: none;
        font-size: 20px;
    }

    .success-icon {
        width: 100px;
        height: 100px;
        background-color: #e6f0ff;
        color: #007bff;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 50px;
        margin: 0 auto 30px;
        border: 4px solid #007bff;
    }

    .success-card h2 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 15px;
        color: #000;
    }

    .success-card p {
        color: #666;
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 40px;
    }

    .btn-continue {
        width: 100%;
        padding: 16px;
        background-color: #004a99;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: background-color 0.3s;
    }

    .btn-continue:hover {
        background-color: #003366;
    }
</style>

<div class="success-container">
    <div class="success-card">
        <a href="{% url 'login' %}" class="back-btn"><i class="fa fa-chevron-left"></i></a>
        
        <div class="success-icon">
            <i class="fa fa-check"></i>
        </div>

        <h2>Đăng ký tài khoản thành công</h2>
        <p>Chúc mừng! Tài khoản của bạn đã được đăng ký thành công. Nhấn vào nút "Tiếp tục" để đăng nhập</p>

        <a href="{% url 'login' %}" class="btn-continue">Tiếp tục</a>
    </div>
</div>
{% endblock %}
