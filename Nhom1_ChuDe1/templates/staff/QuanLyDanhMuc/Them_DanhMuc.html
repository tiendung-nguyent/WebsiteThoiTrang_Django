<!-- ==================== MODAL THÊM DANH MỤC MỚI ==================== -->
<div id="modalCreate" class="modal">
    <div class="modal-content">

        <div class="modal-header">
            <h2>Thêm danh mục mới</h2>
            <button class="close-btn" onclick="closeModal('modalCreate')">✕</button>
        </div>

        <div class="form-group">
            <label>Mã danh mục</label>
            <input type="text" id="maDanhMuc" readonly>
            <small>* Mã danh mục được tạo tự động và không thể thay đổi</small>
        </div>

        <div class="form-group">
            <label>Tên danh mục <span class="required">*</span></label>
            <input type="text" id="tenDanhMuc" placeholder="Nhập tên danh mục" required>
        </div>

        <div class="form-group">
            <label>Thuộc giới tính <span class="required">*</span></label>
            <div class="gender-options">
                <button type="button" id="btnNam" class="gender-btn active" onclick="selectGender('NAM')">
                    ♂ NAM
                </button>
                <button type="button" id="btnNu" class="gender-btn" onclick="selectGender('NỮ')">
                    ♀ NỮ
                </button>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('modalCreate')">Hủy</button>
            <button class="btn-save" onclick="saveNewCategory()">Lưu</button>
        </div>
    </div>
</div>
