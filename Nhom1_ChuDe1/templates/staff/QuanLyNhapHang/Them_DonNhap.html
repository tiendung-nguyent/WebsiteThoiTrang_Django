<div id="modalCreate" class="modal">
    <div class="modal-content" style="width: 800px;">
        <div class="modal-header">
            <h3>Tạo đơn nhập hàng mới</h3>
            <span class="close" onclick="closeModal('modalCreate')">&times;</span>
        </div>
        <div class="form-grid">
            <div class="input-group">
                <label>Tên nhà cung cấp</label>
                <input type="text" placeholder="Nhập tên NCC">
            </div>
            <div class="input-group">
                <label>Ngày nhập hàng</label>
                <input type="date">
            </div>
        </div>
        <div class="product-selection">
            <div class="form-grid" style="grid-template-columns: 2fr 1fr;">
                <div class="input-group"><label>Tên sản phẩm (Chung)</label><input type="text" placeholder="Tên sản phẩm"></div>
                <div class="input-group"><label>Đơn giá nhập (VNĐ)</label><input type="number" value="0"></div>
            </div>
            <div class="form-grid" style="grid-template-columns: 1fr 1fr 1fr 1fr;">
                <div class="input-group"><select><option>-- Chọn màu --</option></select></div>
                <div class="input-group"><select><option>-- Chọn size --</option></select></div>
                <div class="input-group"><input type="number" value="1"></div>
                <button class="add-to-list">Thêm xuống</button>
            </div>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
            <button type="button" class="btn-no" onclick="closeModal('modalCreate')" style="padding: 12px 30px;">
                Hủy bỏ
            </button>
            <button type="button" class="btn-yes" style="padding: 12px 30px; background-color: #002d52;">
                Lưu & Nhập hàng
            </button>
        </div>
    </div>
</div>
