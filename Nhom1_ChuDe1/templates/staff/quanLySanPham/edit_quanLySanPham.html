{% extends "staff/base_staff.html" %}

{% block title %}Cập nhật sản phẩm - Cen Sports{% endblock %}

{% block content %}
<style>
    /* --- MODAL OVERLAY --- */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        padding: 20px;
    }

    /* --- MODAL CARD --- */
    .modal-card {
        background: white;
        width: 100%;
        max-width: 600px;
        max-height: 90vh;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        animation: modalFadeIn 0.3s ease-out;
    }

    @keyframes modalFadeIn {
        from { transform: translateY(-20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
        padding: 15px 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #eee;
        flex-shrink: 0;
    }

    .modal-header h2 { font-size: 18px; color: #002140; }
    .modal-header h2 span { color: #888; font-weight: normal; margin-left: 8px; }
    .close-btn { font-size: 22px; color: #aaa; cursor: pointer; }

    /* --- FORM BODY (Scrollable) --- */
    .modal-body {
        padding: 20px 25px;
        overflow-y: auto;
        flex-grow: 1;
    }

    .modal-body::-webkit-scrollbar { width: 6px; }
    .modal-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
        width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

    .input-icon-wrapper { position: relative; }
    .input-icon-wrapper i { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #888; }

    /* Tags Styling */
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag-item { padding: 5px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.2s; }
    
    /* Màu xanh đậm cho các tag được chọn như trong ảnh */
    .tag-item.active { 
        background-color: #003366; 
        color: white; 
        border-color: #003366; 
    }
    
    .tag-add { padding: 5px 12px; border: 1px dashed #bbb; border-radius: 6px; color: #888; cursor: pointer; }

    /* --- FOOTER --- */
    .modal-footer {
        padding: 15px 25px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        border-top: 1px solid #eee;
        flex-shrink: 0;
        background: white;
    }

    .btn-hủy { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-lưu { background: #001a33; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; }
</style>

<div class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <h2>Cập nhật sản phẩm: <span>SP0000001</span></h2>
            <i class="fa fa-times close-btn" onclick="history.back()"></i>
        </div>

        <form id="editProductForm" action="#" method="GET" style="display: contents;">
            <div class="modal-body">
                <div class="form-group">
                    <label>Tên sản phẩm</label>
                    <input type="text" value="Áo thun thể thao Pro">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Danh mục</label>
                        <select>
                            <option selected>Áo thun nam</option>
                            <option>Quần nam</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Giá bán (VNĐ)</label>
                        <input type="number" value="350000">
                    </div>
                </div>

                <div class="form-group">
                    <label>URL Hình ảnh</label>
                    <div class="input-icon-wrapper">
                        <input type="text" value="https://images.unsplash.com/photo-1521572163474...">
                        <i class="fa fa-image"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Kích cỡ</label>
                    <div class="tag-list">
                        <span class="tag-item">S</span>
                        <span class="tag-item active">M</span>
                        <span class="tag-item active">L</span>
                        <span class="tag-item active">XL</span>
                        <span class="tag-item">XXL</span>
                        <span class="tag-add">+</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Màu sắc</label>
                    <div class="tag-list">
                        <span class="tag-item active">Đen</span>
                        <span class="tag-item">Trắng</span>
                        <span class="tag-item active">Xanh</span>
                        <span class="tag-item">Đỏ</span>
                        <span class="tag-item">Xám</span>
                        <span class="tag-item">Vàng</span>
                        <span class="tag-add">+</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Mô tả chi tiết</label>
                    <textarea rows="3">Áo thun thể thao chất liệu thoáng mát.</textarea>
                </div>

                <div class="form-group">
                    <label>Trạng thái</label>
                    <select>
                        <option selected>Đang bán</option>
                        <option>Ngừng bán</option>
                    </select>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-hủy" onclick="history.back()">Hủy</button>
                <button type="submit" class="btn-lưu">Lưu</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Tag Click Toggle
        document.querySelectorAll('.tag-item').forEach(tag => {
            tag.addEventListener('click', function() {
                this.classList.toggle('active');
            });
        });

        // Form Submit
        const form = document.getElementById('editProductForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Cập nhật thông tin thành công!");
            window.location.href = "{% url 'quanLySP' %}";
        });
    });
</script>
{% endblock %}
