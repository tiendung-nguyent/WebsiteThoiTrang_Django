{% extends "staff/base_staff.html" %}

{% block content %}
<style>
    /* Layout & Header */
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .page-title { font-size: 24px; font-weight: 700; color: #1e2937; }

    /* Search Bar đặc trưng Cen Sports */
    .search-container {
        background: white; padding: 15px 20px; border-radius: 12px 12px 0 0;
        border: 1px solid #f1f5f9; border-bottom: none;
    }
    .search-box { width: 100%; max-width: 450px; position: relative; }
    .search-box input {
        width: 100%; padding: 12px 15px 12px 40px;
        border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px;
    }
    .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }

    /* Table */
    .table-container { background: white; border-radius: 0 0 12px 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); overflow: hidden; border: 1px solid #f1f5f9; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 16px 20px; text-align: left; font-size: 13px; font-weight: 600; color: #64748b; background: #f8fafc; text-transform: uppercase; }
    td { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; color: #1e2937; font-weight: 500; }

    .customer-id { color: #94a3b8; font-weight: 400; font-family: monospace; }
    .action-btn { background: none; border: none; font-size: 18px; margin: 0 8px; cursor: pointer; transition: 0.2s; }

    /* Modal Base */
    .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
    .modal-content { background: #fff; margin: 5% auto; border-radius: 24px; width: 100%; max-width: 480px; position: relative; overflow: hidden; }
</style>

<div class="page-header">
    <h2 class="page-title">Quản lý khách hàng</h2>
</div>

<div class="search-container">
    <div class="search-box">
        <i class="fa fa-search"></i>
        <input type="text" placeholder="Tìm tên, số điện thoại khách hàng...">
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>MÃ KHÁCH HÀNG</th>
                <th>HỌ VÀ TÊN</th>
                <th>SỐ ĐIỆN THOẠI</th>
                <th>THAO TÁC</th>
            </tr>
        </thead>
        <tbody id="customerTableBody"></tbody>
    </table>
</div>

{% include "staff/QuanLyKhachHang/XemChiTiet_KhachHang.html" %}
{% include "staff/QuanLyKhachHang/Xoa_KhachHang.html" %}

<script>
    let customers = [
        { id: "KH0000001", name: "Nguyễn Văn A", phone: "0901234567", orders: 3, totalSpend: "2.500.000", address: "Q.1, TP.HCM" },
        { id: "KH0000002", name: "Nguyễn Văn B", phone: "0901234567", orders: 1, totalSpend: "500.000", address: "Q.3, TP.HCM" },
        { id: "KH0000003", name: "Nguyễn Văn C", phone: "0901234567", orders: 12, totalSpend: "15.000.000", address: "Q.Bình Thạnh, TP.HCM" }
    ];

    function renderTable() {
        const tbody = document.getElementById('customerTableBody');
        tbody.innerHTML = '';
        customers.forEach(cust => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="customer-id">${cust.id}</td>
                <td>${cust.name}</td>
                <td>${cust.phone}</td>
                <td>
                    <button class="action-btn" style="color:#94a3b8" onclick="openDetailModal('${cust.id}')"><i class="fa fa-eye"></i></button>
                    <button class="action-btn" style="color:#ef4444" onclick="openDeleteModal('${cust.id}')"><i class="fa fa-trash"></i></button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function openDetailModal(id) {
        const cust = customers.find(c => c.id === id);
        if(!cust) return;

        document.getElementById('detName').innerText = "Khách hàng " + cust.name;
        document.getElementById('detPhoneHeader').innerText = cust.phone;
        document.getElementById('detId').innerText = cust.id;
        document.getElementById('detOrders').innerText = cust.orders;
        document.getElementById('detSpend').innerText = cust.totalSpend + " đ";
        document.getElementById('detAddress').innerText = cust.address;

        document.getElementById('modalDetail').style.display = 'block';
    }

    function openDeleteModal(id) {
        document.getElementById('deleteTargetId').value = id;
        document.getElementById('modalDelete').style.display = 'block';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    function confirmDelete() {
        const id = document.getElementById('deleteTargetId').value;
        customers = customers.filter(c => c.id !== id);
        renderTable();
        closeModal('modalDelete');
    }

    window.onload = renderTable;
</script>
{% endblock %}
